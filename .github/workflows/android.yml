name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build ARM64 APK
        run: ./gradlew assembleArm64Debug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: OpenTune-arm64
          path: app/build/outputs/apk/arm64/debug/*.apk
