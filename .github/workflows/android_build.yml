name: Build Signed APKs (Manual)

# 只保留 workflow_dispatch，表示必須手動按按鈕才會開始
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 建立 keystore 資料夾並將金鑰解碼到正確路徑 (配合 app/build.gradle.kts 的設定)
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo $ENCODED_STRING | base64 -d > app/keystore/release.keystore

      # 執行編譯，更新環境變數名稱以符合 app/build.gradle.kts，並加入 API Key
      - name: Build APKs
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}
        run: ./gradlew assembleUniversalDebug assembleUniversalRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opentune-debug-apk
          path: app/build/outputs/apk/universal/debug/*.apk

      - name: Upload Release APK (Signed)
        uses: actions/upload-artifact@v4
        with:
          name: opentune-release-signed-apk
          path: app/build/outputs/apk/universal/release/*.apk
