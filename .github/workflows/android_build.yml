name: Build Signed APKs (Manual)

on:
  workflow_dispatch:

# 強制 GitHub Actions 使用 Node.js 24 執行環境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Signed APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo $ENCODED_STRING | base64 -d > app/keystore/release.keystore

      - name: Build APKs
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}
        # 確保編譯 Universal Release 並確認產出檔名
        run: |
          ./gradlew assembleUniversalRelease --stacktrace
          # 確保產出的檔名與 Updater.kt 要求的 app-universal-release.apk 一致
          cd app/build/outputs/apk/universal/release/
          mv *.apk app-universal-release.apk || true

      - name: Upload Debug APK (Manual Build)
        uses: actions/upload-artifact@v4
        with:
          name: opentune-debug-apk
          path: app/build/outputs/apk/universal/debug/*.apk

      - name: Upload Release APK (Signed)
        uses: actions/upload-artifact@v4
        with:
          name: opentune-release-signed-apk
          path: app/build/outputs/apk/universal/release/app-universal-release.apk
